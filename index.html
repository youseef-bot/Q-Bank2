<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Q Pro - منصة الاختبارات الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-content">
            <div class="brand">
                <span class="icon">⚡</span> Bank <span class="highlight">Q</span> <span class="badge">PRO</span>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">النقاط:</span>
                    <span class="stat-value" id="score-display">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">التقدم:</span>
                    <span class="stat-value" id="progress-text">0 / 60</span>
                </div>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </nav>

    <main class="quiz-wrapper">
        <div class="intro-header">
            <h1>اختبر مهاراتك في HTML & CSS</h1>
            <p>اختر الإجابة الصحيحة واكتشف الشرح المفصل لتطوير مستواك البرمجي.</p>
        </div>
        
        <div id="quiz-container"></div>
        
        <div class="completion-message" id="completion-message">
            🎉 رائع! لقد أتممت جميع الأسئلة. راجع أخطائك في الأعلى للتعلم منها.
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
